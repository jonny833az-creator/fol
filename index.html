<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="logo">SaulDesign</div>
        <nav>
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
        </nav>
    </header>
    <section class="hero">
        <div class="hero-text">
            <h1>Creative UI <span>Designer</span></h1>
            <p>I design modern and clean user interfaces.</p>
            <div class="buttons">
                <button class="primary">Hire Me</button>
                <button class="secondary">Download CV</button>
            </div>
        </div>
        <div class="hero-img">
            <img src="Group 2345.png">
        </div>
    </section>
    <section class="about">
        <h2>About <span>Me</span></h2>
        <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit.</p>
    </section>
    <section class="contact">
        <h2>Got a project in <span>mind?</span></h2>
        <form>
            <input type="text" placeholder="Your name">
            <input type="email" placeholder="Your email">
            <textarea placeholder="Your message"></textarea>
            <button type="submit" class="primary">Send Message</button>
        </form>
    </section>
</body>
</html>
